# version: '3.9'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trip-log-server
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - GEOAPIFY_API_KEY=${GEOAPIFY_API_KEY}
      - GEOAPIFY_TIMEOUT=${GEOAPIFY_TIMEOUT:-5}
      - GEOAPIFY_AUTOCOMPLETE_LIMIT=${GEOAPIFY_AUTOCOMPLETE_LIMIT:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DRF_THROTTLE_ANON=${DRF_THROTTLE_ANON:-60/min}
      - DRF_THROTTLE_USER=${DRF_THROTTLE_USER:-120/min}
      - DJANGO_SECURE_SSL_REDIRECT=${DJANGO_SECURE_SSL_REDIRECT:-False}
    volumes:
      - .:/app
      - /app/staticfiles
      - /app/.venv
    networks:
      - trip-log-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  trip-log-network:
    driver: bridge
